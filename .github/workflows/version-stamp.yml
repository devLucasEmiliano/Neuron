name: Version Stamp

on:
  push:
    branches: [testing, stable]

jobs:
  version-stamp:
    name: Auto-update version on merge
    runs-on: ubuntu-latest
    # Skip if the push was made by the bot itself (avoid infinite loop)
    if: github.actor != 'github-actions[bot]'

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine branch suffix and version bump
        id: branch-info
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          case "$BRANCH" in
            stable)
              echo "suffix=s" >> "$GITHUB_OUTPUT"
              echo "bump=--patch" >> "$GITHUB_OUTPUT"
              ;;
            testing)
              echo "suffix=b" >> "$GITHUB_OUTPUT"
              echo "bump=" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "::error::Unexpected branch: $BRANCH"
              exit 1
              ;;
          esac
          echo "Branch: $BRANCH, suffix: $(grep suffix <<< "$(cat "$GITHUB_OUTPUT")")"

      - name: Run bump-version.sh
        run: |
          COMMIT_HASH="${GITHUB_SHA}"
          BUMP="${{ steps.branch-info.outputs.bump }}"
          SUFFIX="${{ steps.branch-info.outputs.suffix }}"

          chmod +x scripts/bump-version.sh
          scripts/bump-version.sh \
            --branch "$SUFFIX" \
            --hash "$COMMIT_HASH" \
            $BUMP

      - name: Commit and push version update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add manifest.json VERSION
          if git diff --cached --quiet; then
            echo "No version changes to commit"
            exit 0
          fi

          VERSION=$(cat VERSION)
          git commit -m "chore: stamp version ${VERSION}"
          git push
