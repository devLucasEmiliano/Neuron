name: Validate

on:
  push:
    branches: [developing, testing, stable]
  pull_request:
    branches: [developing, testing, stable]

jobs:
  validate:
    name: Validate Extension
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate manifest.json is well-formed JSON
        run: |
          echo "Validating manifest.json..."
          if ! jq empty manifest.json 2>/dev/null; then
            echo "::error::manifest.json is not valid JSON"
            exit 1
          fi
          echo "manifest.json is valid JSON"

      - name: Validate manifest.json required fields
        run: |
          echo "Checking required manifest fields..."
          ERRORS=0

          # Check manifest_version
          MV=$(jq -r '.manifest_version // empty' manifest.json)
          if [ -z "$MV" ]; then
            echo "::error::manifest.json missing 'manifest_version' field"
            ERRORS=$((ERRORS + 1))
          elif [ "$MV" != "3" ] && [ "$MV" != "2" ]; then
            echo "::error::manifest.json 'manifest_version' must be 2 or 3, got: $MV"
            ERRORS=$((ERRORS + 1))
          fi

          # Check name
          NAME=$(jq -r '.name // empty' manifest.json)
          if [ -z "$NAME" ]; then
            echo "::error::manifest.json missing 'name' field"
            ERRORS=$((ERRORS + 1))
          fi

          # Check version (Chrome strict X.Y.Z)
          VERSION=$(jq -r '.version // empty' manifest.json)
          if [ -z "$VERSION" ]; then
            echo "::error::manifest.json missing 'version' field"
            ERRORS=$((ERRORS + 1))
          elif ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::manifest.json 'version' must be in X.Y.Z format, got: $VERSION"
            ERRORS=$((ERRORS + 1))
          fi

          # Check description
          DESC=$(jq -r '.description // empty' manifest.json)
          if [ -z "$DESC" ]; then
            echo "::error::manifest.json missing 'description' field"
            ERRORS=$((ERRORS + 1))
          fi

          if [ "$ERRORS" -gt 0 ]; then
            echo "Found $ERRORS error(s) in manifest.json"
            exit 1
          fi

          echo "All required manifest fields are present and valid"

      - name: Validate VERSION file consistency
        run: |
          if [ -f VERSION ]; then
            VERSION_CONTENT=$(cat VERSION | tr -d '[:space:]')
            MANIFEST_VERSION_NAME=$(jq -r '.version_name // empty' manifest.json)
            if [ -n "$MANIFEST_VERSION_NAME" ] && [ "$VERSION_CONTENT" != "$MANIFEST_VERSION_NAME" ]; then
              echo "::error::VERSION file ($VERSION_CONTENT) does not match manifest.json version_name ($MANIFEST_VERSION_NAME)"
              exit 1
            fi
            echo "VERSION file is consistent with manifest.json"
          else
            echo "No VERSION file found (optional, skipping)"
          fi

      - name: Validate JSON config files
        run: |
          echo "Validating all JSON files..."
          ERRORS=0
          for f in $(find . -name '*.json' -not -path './.git/*' -not -path './node_modules/*'); do
            if ! jq empty "$f" 2>/dev/null; then
              echo "::error::$f is not valid JSON"
              ERRORS=$((ERRORS + 1))
            else
              echo "  OK: $f"
            fi
          done
          if [ "$ERRORS" -gt 0 ]; then
            echo "Found $ERRORS invalid JSON file(s)"
            exit 1
          fi
          echo "All JSON files are valid"

      - name: Lint shell scripts
        run: |
          SCRIPTS=$(find . -name '*.sh' -not -path './.git/*')
          if [ -z "$SCRIPTS" ]; then
            echo "No shell scripts found, skipping"
            exit 0
          fi
          echo "Checking shell scripts for syntax errors..."
          ERRORS=0
          for f in $SCRIPTS; do
            if ! bash -n "$f" 2>/dev/null; then
              echo "::error::$f has syntax errors"
              ERRORS=$((ERRORS + 1))
            else
              echo "  OK: $f"
            fi
          done
          if [ "$ERRORS" -gt 0 ]; then
            echo "Found $ERRORS shell script(s) with syntax errors"
            exit 1
          fi
          echo "All shell scripts pass syntax check"
