name: Auto-Promote to Testing

on:
  workflow_run:
    workflows: ["Validate"]
    types: [completed]
    branches: [developing]

jobs:
  promote:
    name: Create or update promotion PR
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout developing
        uses: actions/checkout@v4
        with:
          ref: developing
          fetch-depth: 0

      - name: Gather commits to promote
        id: commits
        run: |
          # Get commits on developing that are not on testing
          COMMIT_LOG=$(git log origin/testing..origin/developing --oneline --no-merges 2>/dev/null || echo "")
          if [ -z "$COMMIT_LOG" ]; then
            echo "No new commits to promote"
            echo "has_commits=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "has_commits=true" >> "$GITHUB_OUTPUT"
          # Store commit log for the PR body (use a delimiter for multiline)
          {
            echo "log<<COMMITS_EOF"
            echo "$COMMIT_LOG"
            echo "COMMITS_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create or update promotion PR
        if: steps.commits.outputs.has_commits == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COMMIT_LOG="${{ steps.commits.outputs.log }}"
          BODY=$(cat <<EOF
          ## Auto-Promotion: developing → testing

          This PR was automatically created because all CI checks passed on the \`developing\` branch.

          ### Commits being promoted

          \`\`\`
          ${COMMIT_LOG}
          \`\`\`

          ---
          *Auto-generated by the promotion workflow.*
          EOF
          )

          # Check for an existing open PR from developing to testing
          EXISTING_PR=$(gh pr list --base testing --head developing --state open --json number --jq '.[0].number' 2>/dev/null || echo "")

          if [ -n "$EXISTING_PR" ]; then
            echo "Updating existing PR #${EXISTING_PR}"
            gh pr edit "$EXISTING_PR" --body "$BODY"
          else
            echo "Creating new promotion PR"
            gh pr create \
              --base testing \
              --head developing \
              --title "Promote developing → testing" \
              --body "$BODY"
          fi
