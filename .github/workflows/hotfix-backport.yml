name: Hotfix Backport

on:
  pull_request:
    types: [closed]
    branches: [stable]

jobs:
  backport-to-developing:
    name: Backport hotfix to developing
    runs-on: ubuntu-latest
    if: >
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'hotfix/')

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure hotfix branch exists
        run: |
          HOTFIX_BRANCH="${{ github.event.pull_request.head.ref }}"

          # If branch was auto-deleted after merge, recreate it from the PR head SHA
          if ! git ls-remote --exit-code origin "refs/heads/${HOTFIX_BRANCH}" >/dev/null 2>&1; then
            echo "Hotfix branch was deleted, recreating from PR head SHA..."
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
            git checkout -b "$HOTFIX_BRANCH" "$HEAD_SHA"
            git push origin "$HOTFIX_BRANCH"
            echo "Recreated ${HOTFIX_BRANCH} at ${HEAD_SHA}"
          else
            echo "Branch ${HOTFIX_BRANCH} still exists on remote"
          fi

      - name: Create backport PR to developing
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          HOTFIX_BRANCH="${{ github.event.pull_request.head.ref }}"
          PR_TITLE="${{ github.event.pull_request.title }}"
          PR_NUMBER="${{ github.event.pull_request.number }}"

          # Check for an existing open backport PR
          EXISTING_PR=$(gh pr list --base developing --head "$HOTFIX_BRANCH" --state open --json number --jq '.[0].number' 2>/dev/null || echo "")

          # Write PR body to a file to avoid escaping issues
          cat > /tmp/backport-body.md <<EOF
          ## Hotfix Backport: stable → developing

          This PR was automatically created to backport hotfix \`${HOTFIX_BRANCH}\` into \`developing\`.

          Original PR: #${PR_NUMBER} - ${PR_TITLE}

          ---
          *Auto-generated by the hotfix backport workflow.*
          EOF

          if [ -n "$EXISTING_PR" ]; then
            echo "Updating existing backport PR #${EXISTING_PR}"
            gh pr edit "$EXISTING_PR" --body-file /tmp/backport-body.md
          else
            echo "Creating new backport PR"
            gh pr create \
              --base developing \
              --head "$HOTFIX_BRANCH" \
              --title "Backport hotfix: ${PR_TITLE}" \
              --body-file /tmp/backport-body.md
          fi
