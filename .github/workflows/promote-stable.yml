name: Promote to Stable

on:
  workflow_run:
    workflows: ["Validate"]
    types: [completed]
    branches: [testing]

jobs:
  promote:
    name: Create or update promotion PR to stable
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout testing
        uses: actions/checkout@v4
        with:
          ref: testing
          fetch-depth: 0

      - name: Gather commits to promote
        id: commits
        run: |
          COMMIT_LOG=$(git log origin/stable..origin/testing --oneline --no-merges 2>/dev/null || echo "")
          if [ -z "$COMMIT_LOG" ]; then
            echo "No new commits to promote"
            echo "has_commits=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "has_commits=true" >> "$GITHUB_OUTPUT"
          {
            echo "log<<COMMITS_EOF"
            echo "$COMMIT_LOG"
            echo "COMMITS_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create or update promotion PR
        if: steps.commits.outputs.has_commits == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COMMIT_LOG="${{ steps.commits.outputs.log }}"
          BODY=$(cat <<EOF
          ## Promote: testing → stable

          This PR was automatically created because all CI checks passed on the \`testing\` branch.

          ### Commits being promoted

          \`\`\`
          ${COMMIT_LOG}
          \`\`\`

          > Merging this PR will trigger: version bump, .zip packaging, changelog update, and GitHub Release.

          ---
          *Auto-generated by the promotion workflow.*
          EOF
          )

          EXISTING_PR=$(gh pr list --base stable --head testing --state open --json number --jq '.[0].number' 2>/dev/null || echo "")

          if [ -n "$EXISTING_PR" ]; then
            echo "Updating existing PR #${EXISTING_PR}"
            gh pr edit "$EXISTING_PR" --body "$BODY"
          else
            echo "Creating new promotion PR"
            gh pr create \
              --base stable \
              --head testing \
              --title "Promote testing → stable" \
              --body "$BODY"
          fi
